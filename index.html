<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roleta de Brindes</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial, sans-serif;
background:#ffffff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#container{
width:100%;
max-width:500px;
position:relative;
}

canvas{
width:100%;
height:auto;
}

#centro{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:130px;
height:130px;
background:white;
border-radius:50%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
cursor:pointer;
z-index:20;
box-shadow:0 6px 25px rgba(0,0,0,0.15);
}

#seta{
position:absolute;
top:115px;
left:50%;
transform:translateX(-50%);
width:0;
height:0;
border-left:18px solid transparent;
border-right:18px solid transparent;
border-top:30px solid white;
}

#centro img{
width:75%;
}

#centro span{
font-size:12px;
margin-top:4px;
color:#555;
}

#overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
z-index:100;
}

#resultadoBox{
background:white;
padding:30px;
border-radius:20px;
font-size:20px;
font-weight:bold;
text-align:center;
animation:pop .3s ease;
max-width:90%;
}

#resultadoBox span{
color:#ff3b3b;
font-size:22px;
}

@keyframes pop{
from{transform:scale(.7);opacity:0;}
to{transform:scale(1);opacity:1;}
}

</style>
</head>

<body>

<div id="container">

<canvas id="roleta" width="500" height="500"></canvas>

<div id="centro" onclick="girar()">
<div id="seta"></div>
<img src="logo.png">
<span>TOQUE PARA GIRAR</span>
</div>

</div>

<div id="overlay" onclick="fecharResultado()">
<div id="resultadoBox"></div>
</div>

<script>

const canvas=document.getElementById("roleta");
const ctx=canvas.getContext("2d");

const overlay=document.getElementById("overlay");
const resultadoBox=document.getElementById("resultadoBox");

const somRoleta = new Audio("roleta.mp3");
somRoleta.loop=true;

const somVitoria = new Audio("vitoria.mp3");
const somTick = new Audio("tick.mp3");

/* TEXTOS */

const produtosCurto=[
"10% GERAL",
"10% AUTOMAÇÃO",
"CÂMERA WIFI",
"BRINDE",
"PLUG WEG",
"10% SONORIZAÇÃO",
"15% SERVIÇO",
"30% CÂMERA PTZ",
"BRINDE"
];

const produtosCompleto=[
"GANHOU 10% EM QUALQUER PRODUTO → VIRA 15% SE FECHAR HOJE",
"GANHOU 10% EM AUTOMAÇÃO",
"CAMERA DE SEGURANÇA INTERNA WIFI",
"BRINDE PERSONALIZADO",
"PLUG WI-FI SMART WEG HOME",
"GANHOU 10% SONORIZAÇÃO",
"15% OFF EM SERVIÇO",
"30% DE DESCONTO NA CAMERA INTERNA PTZ",
"BRINDE PERSONALIZADO"
];

/* CORES */

const cores=[
"#1f3c88",
"#2962ff",
"#00bcd4",
"#ff9800",
"#4caf50",
"#009688",
"#8bc34a",
"#e53935",
"#3f51b5"
];

/* PROBABILIDADE */

const pesos=[
18,
12,
3,
30,
7,
5,
4,
1,
20
];

let anguloAtual=0;
let girando=false;
let ultimoTick=-1;

/* ESCOLHER PRÊMIO */

function escolherPremio(){

let soma=pesos.reduce((a,b)=>a+b,0);
let random=Math.random()*soma;
let acumulado=0;

for(let i=0;i<pesos.length;i++){
acumulado+=pesos[i];
if(random<=acumulado){
return i;
}
}

return 0;

}

/* DESENHAR ROLETA */

function desenharRoleta(){

const total=produtosCurto.length;
const angulo=(2*Math.PI)/total;

for(let i=0;i<total;i++){

ctx.beginPath();
ctx.moveTo(250,250);
ctx.arc(250,250,250,i*angulo,(i+1)*angulo);
ctx.fillStyle=cores[i%cores.length];
ctx.fill();

ctx.save();
ctx.translate(250,250);
ctx.rotate(i*angulo+angulo/2);

ctx.fillStyle="#fff";
ctx.font="bold 16px Arial";
ctx.textAlign="center";
ctx.textBaseline="middle";

ctx.fillText(produtosCurto[i],170,0);

ctx.restore();

}

}

/* GIRAR ROLETA */

function girar(){

if(girando) return;

girando=true;

somRoleta.currentTime=0;
somRoleta.play();

const premio=escolherPremio();

const total=produtosCurto.length;
const anguloSetor=360/total;

/* posição aleatória dentro da fatia */

const margem=1;
const offset=margem+Math.random()*(anguloSetor-(margem*2));

const destino=360-(premio*anguloSetor+offset)+90;

const voltas=360*5;
const rotacaoFinal=voltas+destino;

const tempo=3000;
const inicio=performance.now();

function animar(agora){

const progresso=(agora-inicio)/tempo;

if(progresso<1){

anguloAtual=rotacaoFinal*easeOutExpo(progresso);

/* TICK NAS FATIAS */

let setorAtual=Math.floor((anguloAtual%360)/anguloSetor);

if(setorAtual!==ultimoTick){

somTick.currentTime=0;
somTick.play();

ultimoTick=setorAtual;

}

desenharComRotacao();

requestAnimationFrame(animar);

}else{

anguloAtual=rotacaoFinal;

somRoleta.pause();

somVitoria.pause();
somVitoria.currentTime=0;
somVitoria.play();

girando=false;

mostrarResultado(premio);

}

}

requestAnimationFrame(animar);

}

/* DESENHAR COM ROTAÇÃO */

function desenharComRotacao(){

ctx.clearRect(0,0,500,500);

ctx.save();

ctx.translate(250,250);
ctx.rotate(anguloAtual*Math.PI/180);
ctx.translate(-250,-250);

desenharRoleta();

ctx.restore();

}

/* RESULTADO */

function mostrarResultado(indice){

resultadoBox.innerHTML=
"🎉 PARABÉNS!<br><br><span>"+produtosCompleto[indice]+"</span>";

overlay.style.display="flex";

}

function fecharResultado(){
overlay.style.display="none";
}

/* DESACELERAÇÃO REALISTA */

function easeOutExpo(t){
return t===1 ? 1 : 1 - Math.pow(2,-10*t);
}

desenharRoleta();

</script>

</body>
</html>
