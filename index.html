<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roleta de Brindes</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#ffffff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#container{
    width:100%;
    max-width:500px;
    position:relative;
}

canvas{
    width:100%;
    height:auto;
}

#centro{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:130px;
    height:130px;
    background:white;
    border-radius:50%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    z-index:20;
    box-shadow:0 6px 25px rgba(0,0,0,0.15);
    transition:transform 0.2s ease;
}

#centro:hover{
    transform:translate(-50%,-50%) scale(1.05);
}

#seta{
    position:absolute;
    top:115px;
    left:50%;
    transform:translateX(-50%);
    width:0;
    height:0;
    border-left:18px solid transparent;
    border-right:18px solid transparent;
    border-top:30px solid white;
}

#centro img{
    width:75%;
}

#centro span{
    font-size:12px;
    margin-top:4px;
    color:#555;
}

#overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:100;
}

#resultadoBox{
    background:white;
    padding:30px;
    border-radius:20px;
    font-size:20px;
    font-weight:bold;
    text-align:center;
    animation:pop 0.3s ease;
    max-width:90%;
}

#resultadoBox span{
    color:#ff3b3b;
    font-size:22px;
}

@keyframes pop{
    from{transform:scale(0.7);opacity:0;}
    to{transform:scale(1);opacity:1;}
}
</style>
</head>

<body>

<div id="container">
    <canvas id="roleta" width="500" height="500"></canvas>

    <div id="centro" onclick="girar()">
        <div id="seta"></div>
        <img src="logo.png" alt="Logo">
        <span>TOQUE PARA GIRAR</span>
    </div>
</div>

<div id="overlay" onclick="fecharResultado()">
    <div id="resultadoBox"></div>
</div>

<script>
const canvas=document.getElementById("roleta");
const ctx=canvas.getContext("2d");
const overlay=document.getElementById("overlay");
const resultadoBox=document.getElementById("resultadoBox");

const produtosCurto=[
"10% GERAL",
"10% AUTOMAÇÃO",
"CÂMERA WIFI",
"BRINDE",
"PLUG WEG",
"10% SONORIZAÇÃO",
"15% SERVIÇO",
"30% CÂMERA PTZ",
"BRINDE"
];

const produtosCompleto=[
"GANHOU 10% EM QUALQUER PRODUTO → VIRA 15% SE FECHAR HOJE",
"GANHOU 10% EM AUTOMAÇÃO",
"CAMERA DE SEGURANÇA INTERNA WIFI",
"BRINDE PERSONALIZADO",
"PLUG WI-FI SMART WEG HOME",
"GANHOU 10% SONORIZAÇÃO",
"15% OFF EM SERVIÇO",
"30% DE DESCONTO NA CAMERA INTERNA PTZ",
"BRINDE PERSONALIZADO"
];

const cores=[
"#1f3c88",
"#2962ff",
"#00bcd4",
"#ff9800",
"#4caf50",
"#009688",
"#8bc34a",
"#e53935",
"#3f51b5"
];

let anguloAtual=0;
let girando=false;

function desenharRoleta(){
    const total=produtosCurto.length;
    const angulo=(2*Math.PI)/total;

    for(let i=0;i<total;i++){
        ctx.beginPath();
        ctx.moveTo(250,250);
        ctx.arc(250,250,250,i*angulo,(i+1)*angulo);
        ctx.fillStyle=cores[i%cores.length];
        ctx.fill();

        ctx.save();
        ctx.translate(250,250);
        ctx.rotate(i*angulo+angulo/2);

        ctx.textAlign="center";
        ctx.textBaseline="middle";
        ctx.fillStyle="#fff";
        ctx.font="bold 17px Arial";

        const texto = produtosCurto[i];
        const palavras = texto.split(" ");
        let linha="";
        let linhas=[];
        const maxWidth=140;

        for(let n=0;n<palavras.length;n++){
            let teste=linha+palavras[n]+" ";
            if(ctx.measureText(teste).width>maxWidth && n>0){
                linhas.push(linha);
                linha=palavras[n]+" ";
            }else{
                linha=teste;
            }
        }
        linhas.push(linha);

        const alturaLinha=20;
        const raioTexto=170;

        for(let j=0;j<linhas.length;j++){
            ctx.fillText(
                linhas[j],
                raioTexto,
                (j-(linhas.length-1)/2)*alturaLinha
            );
        }

        ctx.restore();
    }
}

function girar(){
    if(girando) return;
    girando=true;

    const tempo=4000;
    const inicio=performance.now();
    const rotacaoExtra=Math.random()*2000+2000;

    function animar(agora){
        const decorrido=agora-inicio;
        const progresso=decorrido/tempo;

        if(progresso<1){
            anguloAtual=rotacaoExtra*easeOut(progresso);
            desenharComRotacao();
            requestAnimationFrame(animar);
        }else{
            girando=false;
            calcularResultadoReal();
        }
    }

    requestAnimationFrame(animar);
}

function desenharComRotacao(){
    ctx.clearRect(0,0,500,500);
    ctx.save();
    ctx.translate(250,250);
    ctx.rotate(anguloAtual*Math.PI/180);
    ctx.translate(-250,-250);
    desenharRoleta();
    ctx.restore();
}

function calcularResultadoReal(){
    const total=produtosCurto.length;
    const anguloPorSetor=360/total;

    let graus=(anguloAtual%360+360)%360;
    graus=(360-graus+90)%360;

    const indice=Math.floor(graus/anguloPorSetor);

    resultadoBox.innerHTML=
    "🎉 PARABÉNS!<br><br><span>"+produtosCompleto[indice]+"</span>";

    overlay.style.display="flex";
}

function fecharResultado(){
    overlay.style.display="none";
}

function easeOut(t){
    return 1-Math.pow(1-t,3);
}

desenharRoleta();
</script>

</body>
</html>
